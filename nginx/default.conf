# ── Nexus Support Agent — internal nginx reverse proxy ───────────────────────
# TLS is terminated by IIS (ARR) upstream; nginx receives plain HTTP on :80.
# HSTS and the HTTP→HTTPS redirect are handled by IIS, not duplicated here.

# Rate-limit zones (defense in depth; the backend also rate-limits).
limit_req_zone $binary_remote_addr zone=login:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m      rate=120r/m;
limit_req_zone $binary_remote_addr zone=frontend:10m rate=240r/m;
limit_req_status 429;

server {
    listen 80;
    server_name _;

    server_tokens off;

    # Admin uploads accept files up to 100 MB (PDF/MP4/…); allow headroom.
    client_max_body_size 105m;

    client_header_timeout 15s;
    client_body_timeout   60s;
    send_timeout          60s;
    keepalive_timeout     65s;

    # CVE-2025-29927 — strip the middleware-bypass header before Next.js.
    proxy_set_header x-middleware-subrequest "";

    # Security headers (HSTS is added by IIS to avoid duplicates).
    add_header X-Frame-Options        "SAMEORIGIN"                               always;
    add_header X-Content-Type-Options "nosniff"                                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin"          always;
    add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

    # Never expose the API's interactive docs on-prem.
    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 404;
    }

    # Backend health check.
    location = /health {
        proxy_pass       http://backend:8000/health;
        proxy_set_header Host $host;
    }

    # Login — strict rate limit (brute-force protection).
    location = /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Admin document upload — large bodies, no tight rate limit (bulk seeding).
    location = /api/admin/upload {
        proxy_pass         http://backend:8000;
        proxy_request_buffering off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Backend API — SSE streaming: buffering MUST be off so tokens flush live.
    location /api/ {
        limit_req zone=api burst=40 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_buffering            off;
        proxy_cache               off;
        chunked_transfer_encoding on;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Next.js immutable static assets — long cache.
    location /_next/static/ {
        proxy_pass       http://frontend:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /_next/image {
        proxy_pass       http://frontend:3000;
        proxy_set_header Host $host;
    }

    # Everything else → Next.js frontend.
    location / {
        limit_req zone=frontend burst=60 nodelay;
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
