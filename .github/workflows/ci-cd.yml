name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "phase-*"]
  # Deploy only runs when manually triggered from the Actions tab
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to GCP Cloud Run?"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]

env:
  PROJECT_ID: nexus-support-agent
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/nexus-support-agent/nexus-repo

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install \
            fastapi==0.136.3 \
            httpx==0.27.2 \
            pydantic==2.13.4 \
            pydantic-settings==2.14.2 \
            PyJWT==2.13.0 \
            sqlalchemy[asyncio]==2.0.35 \
            python-multipart==0.0.31 \
            passlib[bcrypt]==1.7.4 \
            bcrypt==4.0.1 \
            aiosqlite==0.20.0 \
            pgvector==0.4.2 \
            filetype==1.2.0 \
            pytest==8.3.2 \
            pytest-asyncio==0.23.8 \
            anyio==4.4.0 \
            pip-audit==2.7.3

      - name: Run tests
        working-directory: backend
        env:
          AUTH_PROVIDER: local
          STORAGE_PROVIDER: local
          EMBEDDING_PROVIDER: local
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          RATE_LIMIT_ENABLED: "false"
        run: pytest tests/ -v --tb=short

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          pip-audit --requirement requirements.txt \
            --ignore-vuln PYSEC-2022-42969 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln GHSA-wh2j-26j7-9728 \
            --ignore-vuln GHSA-6w46-j5rx-g56g \
            --ignore-vuln PYSEC-2025-217 \
            --ignore-vuln GHSA-69w3-r845-3855 \
            --ignore-vuln GHSA-rrmf-rvhw-rf47

  # ── Frontend tests (every push / PR) ────────────────────────────────────────
  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm run test:ci
        working-directory: frontend

  # ── Docker build check (every push / PR) ─────────────────────────────────────
  build:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [test, frontend-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t nexus-backend:ci

      - name: Build frontend image
        run: docker build ./frontend -t nexus-frontend:ci

  # ── Deploy (manual trigger only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to Cloud Run
    needs: [test, frontend-test, build]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Build & push backend
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/backend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/backend:latest \
            ./backend
          docker push ${{ env.REGISTRY }}/backend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/backend:latest

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy nexus-backend \
            --image=${{ env.REGISTRY }}/backend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --service-account=nexus-cloudrun@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:nexus-db \
            --set-secrets="DATABASE_URL=nexus-database-url:latest,LOCAL_JWT_SECRET=nexus-jwt-secret:latest" \
            --set-env-vars="AUTH_PROVIDER=local,STORAGE_PROVIDER=gcs,EMBEDDING_PROVIDER=vertexai,EMBEDDING_DIMENSIONS=768,GCS_BUCKET_NAME=nexus-agent-docs-988042937611,VERTEX_AI_PROJECT=${{ env.PROJECT_ID }},VERTEX_AI_LOCATION=${{ env.REGION }}" \
            --allow-unauthenticated \
            --min-instances=1 \
            --max-instances=10 \
            --memory=2Gi \
            --cpu=1 \
            --timeout=300 \
            --quiet

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Get backend URL
        id: backend-url
        run: |
          URL=$(gcloud run services describe nexus-backend \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Build & push frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }} \
            -t ${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/frontend:latest \
            ./frontend
          docker push ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/frontend:latest

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy nexus-frontend \
            --image=${{ env.REGISTRY }}/frontend:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --set-env-vars="NEXT_PUBLIC_API_URL=${{ steps.backend-url.outputs.url }}" \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=5 \
            --memory=512Mi \
            --cpu=1 \
            --quiet

      - name: Print deployment URLs
        run: |
          echo "Backend: $(gcloud run services describe nexus-backend --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --format='value(status.url)')"
          echo "Frontend: $(gcloud run services describe nexus-frontend --region=${{ env.REGION }} --project=${{ env.PROJECT_ID }} --format='value(status.url)')"
